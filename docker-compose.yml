services:
  mysql:
    image: mysql:8.4
    container_name: shapeup-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE must be defined}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER must be defined}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be defined}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be defined}
    volumes:
      - shapeup_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - shapeup_internal

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: build
    container_name: shapeup-migrate
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    command: npm run prisma:deploy --workspace backend
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"
    networks:
      - shapeup_internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runner
    container_name: shapeup-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3333
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be defined}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      FRONTEND_URL: https://${APP_HOST}
      PASSWORD_RESET_URL: https://${APP_HOST}/reset-password
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - shapeup_internal

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: shapeup-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - shapeup_internal

  nginx:
    image: nginx:1.27-alpine
    container_name: shapeup-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/shapeup.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - shapeup_public
      - shapeup_internal

volumes:
  shapeup_mysql_data:

networks:
  shapeup_public:
  shapeup_internal:
    internal: true
